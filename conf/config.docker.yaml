name: "gamepulse"
mode: "release"
port: 8080
version: "v0.0.1"
start_time: "2025-12-05"
machine_id: 1

auth:
  jwt_expire: 8760
  jwt_secret: "gamepulse_jwt_secret_change_me"

log:
  level: "info"
  filename: "/app/web_app.log"
  max_size: 200
  max_age: 30
  max_backups: 7

postgres:
  host: "postgres"
  port: 5432
  user: "gamepulse"
  password: "gamepulse_pg_password_change_me"
  dbname: "gamepulse"
  max_open_conns: 20
  max_idle_conns: 5

redis:
  host: "redis"
  port: 6379
  password: "gamepulse_redis_password_change_me"
  db: 0
  pool_size: 10

minio:
  endpoint: "minio:9000"
  public_endpoint: "101.43.85.94/minio"
  access_key: "gamepulse_minio"
  secret_key: "gamepulse_minio_password_change_me"
  use_ssl: false
  bucket_name: "gamepulse"

llm:
  api_key: ""
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "qwen3.6-flash"
  timeout_seconds: 60

embedding:
  api_key: ""
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "text-embedding-v4"
  timeout_seconds: 30

chat_agent:
  top_k: 6
  max_history_messages: 12
  max_source_posts: 4
  max_context_chars: 5000
