name: "bluebell"
mode: "dev"
port: 8080
version: "v0.0.1"
start_time: "2025-12-05"
machine_id: 1

auth:
  jwt_expire: 8760

log:
  level: "debug"
  filename: "web_app.log"
  max_size: 200
  max_age: 30
  max_backups: 7

postgres:
  host: 127.0.0.1
  port: 5432
  user: "postgres"
  password: "123456"
  dbname: "gamepulse"
  max_open_conns: 20
  max_idle_conns: 5

redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  db: 0
  pool_size: 10

minio:
  endpoint: "127.0.0.1:9000"
  access_key: "admin"
  secret_key: "password123"
  use_ssl: false
  bucket_name: "gamepulse"


llm:
  api_key: "<Input your key>"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "qwen3.6-plus"
  timeout_seconds: 30
